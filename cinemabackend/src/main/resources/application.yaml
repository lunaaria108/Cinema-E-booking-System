spring:
  application:
    name: cinemabackend

  datasource:
    url: jdbc:postgresql://localhost:5432/cinema
    username: postgres
    password: postgres
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: none
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect

card:
  encryption:
    key: ${CARD_ENCRYPTION_KEY:VGhpc0lzQVRlc3RLZXlGb3JBRVMxMjM0NTY3ODkwMTI=}
